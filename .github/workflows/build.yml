# GitHub Actions: Auto-build .exe from .py via PyInstaller
name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          # 固定 PyInstaller 版本和 openpyxl 版本
          pip install pyinstaller==6.11.1
          if (Test-Path "requirements.txt") {
            Get-Content "requirements.txt" | ForEach-Object {
              $pkg = $_.Trim()
              if ($pkg -and $pkg -notmatch '^#') {
                pip install $pkg
              }
            }
          }
          pip list  # 列出已安装包供调试

      - name: Build EXE
        run: |
          $files = @(Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.py" -Recurse | Where-Object { $_.Name -ne "setup.py" })
          foreach ($f in $files) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name)

            $collectArgs = @()
            if (Test-Path "requirements.txt") {
              Get-Content "requirements.txt" | ForEach-Object {
                $pkg = $_.Trim()
                if ($pkg -and $pkg -notmatch '^#') {
                  $collectArgs += "--collect-all"
                  $collectArgs += $pkg
                }
              }
            }

            # 全面收集 openpyxl — 包括所有子模块和 *.pyc 数据文件
            $openpyxlArgs = @(
              "--collect-all", "openpyxl",
              "--collect-all", "et_xmlfile",
              "--collect-submodules", "openpyxl",
              "--collect-data", "openpyxl",
              "--collect-data", "et_xmlfile",
              "--hidden-import", "et_xmlfile"
            )

            pyinstaller --onefile --console --name "$name" @collectArgs @openpyxlArgs "$($f.FullName)" 2>&1
            echo "===== WARN FILE ====="
            Get-Content "build/${name}/warn-${name}.txt" -ErrorAction SilentlyContinue
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-exe
          path: dist/*.exe
          if-no-files-found: error
